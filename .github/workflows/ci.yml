name: Build and Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout service repo
      uses: actions/checkout@v4


    - name: Login to GHCR
      run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin


    - name: Build Docker Image
      run: |
        docker build -t ghcr.io/${{ github.repository }}:${{ github.sha }} .


    - name: Push Docker Image
      run: |
        docker push ghcr.io/${{ github.repository }}:${{ github.sha }}


    - name: Checkout GitOps repo
      uses: actions/checkout@v4
      with:
        repository: akarsh5080/gitops-repo
        token: ${{ secrets.GITOPS_TOKEN }}
        path: gitops


    - name: Update image tag in GitOps repo
      run: |
        cd gitops/apps/service-nginx-repo/dev
        sed -i "s/tag:.*/tag: ${{ github.sha }}/" values.yaml


    - name: Commit and push GitOps change
      run: |
        cd gitops
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        git add .
        git commit -m "Deploy service-nginx-repo ${{ github.sha }}" || echo "No changes"
        git push https://x-access-token:${{ secrets.GITOPS_TOKEN }}@github.com/akarsh5080/gitops-repo.git
